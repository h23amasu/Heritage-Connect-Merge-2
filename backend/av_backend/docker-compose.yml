version: '3.8'

services:
  # PostgreSQL database with PostGIS for geographic data
  db:
    image: postgis/postgis:15-3.4
    container_name: av_db
    environment:
      POSTGRES_USER: av_user
      POSTGRES_PASSWORD: av_password
      POSTGRES_DB: av_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U av_user -d av_database"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
